 <template>
    <div class="dashboard-container">
      <!-- Top Toolbar -->
      <mat-toolbar color="primary" class="top-toolbar">
        <button 
          mat-icon-button 
          (click)="drawer.toggle()"
          *ngIf="isHandset$ | async">
          <mat-icon>menu</mat-icon>
        </button>
        
        <mat-icon class="toolbar-logo">hotel</mat-icon>
        <span class="toolbar-title">Hotel Booking System</span>
        
        <span class="spacer"></span>
        
        <!-- User Menu -->
        <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-button">
          <mat-icon>account_circle</mat-icon>
          <span *ngIf="!(isHandset$ | async)" class="user-name">
            {{ currentUser?.username || 'User' }}
          </span>
          <mat-icon>arrow_drop_down</mat-icon>
        </button>
        
        <mat-menu #userMenu="matMenu">
          <mat-list dense *ngIf="currentUser">
            <mat-list-item>
              <mat-icon matListItemIcon>person</mat-icon>
              <div matListItemTitle>{{ currentUser.username }}</div>
              <div matListItemLine>{{ currentUser.email }}</div>
            </mat-list-item>
            <mat-list-item>
              <mat-icon matListItemIcon>badge</mat-icon>
              <div matListItemTitle>Role</div>
              <div matListItemLine>{{ currentUser.roleName }}</div>
            </mat-list-item>
          </mat-list>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </mat-toolbar>

      <!-- Sidenav Container -->
      <mat-sidenav-container class="sidenav-container">
        <!-- Side Navigation -->
        <mat-sidenav 
          #drawer 
          class="sidenav"
          [mode]="(isHandset$ | async) ? 'over' : 'side'"
          [opened]="(isHandset$ | async) === false"
          fixedInViewport>
          
          <mat-nav-list>
            <div class="nav-section-title">Main Menu</div>
            
            <a 
              mat-list-item 
              *ngFor="let item of mainNavItems"
              [routerLink]="item.route"
              routerLinkActive="active-link"
              [matBadge]="item.badge || null"
              matBadgeColor="accent"
              matBadgeSize="small">
              <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
              <span matListItemTitle>{{ item.label }}</span>
            </a>
            
            <mat-divider class="nav-divider"></mat-divider>
            
            <div class="nav-section-title">Management</div>
            
            <a 
              mat-list-item 
              *ngFor="let item of managementNavItems"
              [routerLink]="item.route"
              routerLinkActive="active-link">
              <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
              <span matListItemTitle>{{ item.label }}</span>
            </a>
            
            <mat-divider class="nav-divider" *ngIf="adminNavItems.length > 0"></mat-divider>
            
            <div class="nav-section-title" *ngIf="adminNavItems.length > 0">Administration</div>
            
            <a 
              mat-list-item 
              *ngFor="let item of adminNavItems"
              [routerLink]="item.route"
              routerLinkActive="active-link">
              <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
              <span matListItemTitle>{{ item.label }}</span>
            </a>
          </mat-nav-list>
          
          <!-- Footer -->
          <div class="sidenav-footer">
            <mat-divider></mat-divider>
            <div class="footer-content">
              <small>Hotel Booking System v1.0</small>
            </div>
          </div>
        </mat-sidenav>

        <!-- Main Content Area -->
        <mat-sidenav-content class="content-area">
          <router-outlet></router-outlet>
        </mat-sidenav-content>
      </mat-sidenav-container>
    </div>
</template>
