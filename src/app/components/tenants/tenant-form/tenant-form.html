<template>
    <div class="container">
      <div class="page-header">
        <button mat-icon-button routerLink="/tenants">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <h1 class="page-title">{{ isEditMode ? 'Edit Guest' : 'Add New Guest' }}</h1>
      </div>

      <!-- Loading State -->
      <div *ngIf="isLoading" class="loading-container">
        <mat-spinner diameter="50"></mat-spinner>
      </div>

      <!-- Tenant Form -->
      <mat-card *ngIf="!isLoading" class="form-card">
        <mat-card-content>
          <form (ngSubmit)="onSubmit()" class="tenant-form">
            <div class="form-row">
              <mat-form-field appearance="outline">
                <mat-label>Full Name</mat-label>
                <input 
                  matInput 
                  [(ngModel)]="tenant.fullName" 
                  name="fullName"
                  placeholder="Enter full name"
                  required>
                <mat-icon matPrefix>person</mat-icon>
              </mat-form-field>
            </div>

            <div class="form-row">
              <mat-form-field appearance="outline">
                <mat-label>Email Address</mat-label>
                <input 
                  matInput 
                  type="email"
                  [(ngModel)]="tenant.email" 
                  name="email"
                  placeholder="Enter email address"
                  required
                  email>
                <mat-icon matPrefix>email</mat-icon>
              </mat-form-field>
            </div>

            <div class="form-row">
              <mat-form-field appearance="outline">
                <mat-label>Phone Number</mat-label>
                <input 
                  matInput 
                  type="tel"
                  [(ngModel)]="tenant.phone" 
                  name="phone"
                  placeholder="Enter phone number"
                  required>
                <mat-icon matPrefix>phone</mat-icon>
              </mat-form-field>
            </div>

            <div class="form-row">
              <mat-form-field appearance="outline">
                <mat-label>Address</mat-label>
                <textarea 
                  matInput 
                  [(ngModel)]="tenant.address" 
                  name="address"
                  placeholder="Enter address"
                  rows="3"
                  required></textarea>
                <mat-icon matPrefix>location_on</mat-icon>
              </mat-form-field>
            </div>

            <div class="form-actions">
              <button 
                mat-button 
                type="button" 
                routerLink="/tenants">
                Cancel
              </button>
              <button 
                mat-raised-button 
                color="primary" 
                type="submit"
                [disabled]="isSaving">
                <mat-spinner diameter="20" *ngIf="isSaving"></mat-spinner>
                <span *ngIf="!isSaving">{{ isEditMode ? 'Update' : 'Create' }}</span>
              </button>
            </div>
          </form>
        </mat-card-content>
      </mat-card>
    </div>
</template>
