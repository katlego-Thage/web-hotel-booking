 <template>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Guest Management</h1>
        <button 
          mat-raised-button 
          color="primary" 
          routerLink="/tenants/new"
          *ngIf="canCreate">
          <mat-icon>person_add</mat-icon>
          Add Guest
        </button>
      </div>

      <!-- Loading State -->
      <div *ngIf="isLoading" class="loading-container">
        <mat-spinner diameter="50"></mat-spinner>
      </div>

      <!-- Tenants Table -->
      <mat-card *ngIf="!isLoading">
        <mat-card-content>
          <!-- Filter -->
          <mat-form-field appearance="outline" class="filter-field">
            <mat-label>Search guests</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Filter by name, email, phone...">
            <mat-icon matPrefix>search</mat-icon>
          </mat-form-field>

          <div class="table-container">
            <table mat-table [dataSource]="dataSource" matSort class="tenants-table">
              
              <!-- Name Column -->
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Guest Name </th>
                <td mat-cell *matCellDef="let tenant">
                  <div class="tenant-info">
                    <div class="avatar">
                      {{ getInitials(tenant.fullName) }}
                    </div>
                    <span class="tenant-name">{{ tenant.fullName }}</span>
                  </div>
                </td>
              </ng-container>

              <!-- Email Column -->
              <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
                <td mat-cell *matCellDef="let tenant">
                  <a [href]="'mailto:' + tenant.email" class="email-link">
                    <mat-icon class="small">email</mat-icon>
                    {{ tenant.email }}
                  </a>
                </td>
              </ng-container>

              <!-- Phone Column -->
              <ng-container matColumnDef="phone">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Phone </th>
                <td mat-cell *matCellDef="let tenant">
                  <a [href]="'tel:' + tenant.phone" class="phone-link" *ngIf="tenant.phone">
                    <mat-icon class="small">phone</mat-icon>
                    {{ tenant.phone }}
                  </a>
                  <span *ngIf="!tenant.phone" class="no-data">-</span>
                </td>
              </ng-container>

              <!-- Address Column -->
              <ng-container matColumnDef="address">
                <th mat-header-cell *matHeaderCellDef> Address </th>
                <td mat-cell *matCellDef="let tenant">
                  <div class="address" *ngIf="tenant.address">
                    <mat-icon class="small">location_on</mat-icon>
                    <span>{{ tenant.address }}</span>
                  </div>
                  <span *ngIf="!tenant.address" class="no-data">-</span>
                </td>
              </ng-container>

              <!-- Actions Column -->
              <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let tenant">
                  <div class="action-buttons">
                    <button 
                      mat-icon-button 
                      color="primary"
                      [routerLink]="['/tenants/edit', tenant.tenantID]"
                      matTooltip="Edit"
                      *ngIf="canEdit">
                      <mat-icon>edit</mat-icon>
                    </button>
                    <button 
                      mat-icon-button 
                      color="warn"
                      (click)="deleteTenant(tenant)"
                      matTooltip="Delete"
                      *ngIf="canDelete">
                      <mat-icon>delete</mat-icon>
                    </button>
                  </div>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

              <!-- No Data Row -->
              <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
                  <mat-icon>people_outline</mat-icon>
                  <p>No guests found</p>
                </td>
              </tr>
            </table>
          </div>

          <mat-paginator 
            [pageSizeOptions]="[5, 10, 25, 50]"
            showFirstLastButtons
            aria-label="Select page of guests">
          </mat-paginator>
        </mat-card-content>
      </mat-card>

      <!-- Guest Cards -->
      <div class="tenant-cards" *ngIf="!isLoading">
        <h3>Recent Guests</h3>
        <div class="cards-grid">
          <mat-card *ngFor="let tenant of tenants.slice(0, 6)" class="tenant-card">
            <mat-card-header>
              <div mat-card-avatar class="card-avatar">
                {{ getInitials(tenant.fullName) }}
              </div>
              <mat-card-title>{{ tenant.fullName }}</mat-card-title>
              <mat-card-subtitle>{{ tenant.email }}</mat-card-subtitle>
            </mat-card-header>
            <mat-card-content>
              <div class="contact-info" *ngIf="tenant.phone">
                <mat-icon>phone</mat-icon>
                <span>{{ tenant.phone }}</span>
              </div>
            </mat-card-content>
            <mat-card-actions align="end">
              <button mat-icon-button color="primary" [routerLink]="['/tenants/edit', tenant.tenantID]">
                <mat-icon>edit</mat-icon>
              </button>
            </mat-card-actions>
          </mat-card>
        </div>
      </div>
    </div>
</template>
