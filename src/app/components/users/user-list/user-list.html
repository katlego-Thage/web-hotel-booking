<template>
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">User Management</h1>
        <button 
          mat-raised-button 
          color="primary" 
          routerLink="/users/new"
          *ngIf="canCreate">
          <mat-icon>add</mat-icon>
          Add User
        </button>
      </div>

      <!-- Loading State -->
      <div *ngIf="isLoading" class="loading-container">
        <mat-spinner diameter="50"></mat-spinner>
      </div>

      <!-- Users Table -->
      <mat-card *ngIf="!isLoading">
        <mat-card-content>
          <!-- Filter -->
          <mat-form-field appearance="outline" class="filter-field">
            <mat-label>Search users</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Filter by name, email...">
            <mat-icon matPrefix>search</mat-icon>
          </mat-form-field>

          <div class="table-container">
            <table mat-table [dataSource]="dataSource" matSort class="users-table">
              
              <!-- Username Column -->
              <ng-container matColumnDef="username">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Username </th>
                <td mat-cell *matCellDef="let user">
                  <div class="user-info">
                    <mat-icon class="user-avatar">account_circle</mat-icon>
                    <span>{{ user.username }}</span>
                  </div>
                </td>
              </ng-container>

              <!-- Email Column -->
              <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
                <td mat-cell *matCellDef="let user"> {{ user.email }} </td>
              </ng-container>

              <!-- Role Column -->
              <ng-container matColumnDef="role">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Role </th>
                <td mat-cell *matCellDef="let user">
                  <mat-chip [class]="'role-chip ' + getRoleClass(user.roleName)">
                    {{ user.roleName || 'N/A' }}
                  </mat-chip>
                </td>
              </ng-container>

              <!-- Created At Column -->
              <ng-container matColumnDef="createdAt">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Created </th>
                <td mat-cell *matCellDef="let user">
                  {{ user.createdAt | date:'mediumDate' }}
                </td>
              </ng-container>

              <!-- Actions Column -->
              <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Actions </th>
                <td mat-cell *matCellDef="let user">
                  <div class="action-buttons">
                    <button 
                      mat-icon-button 
                      color="primary"
                      [routerLink]="['/users/edit', user.userID]"
                      matTooltip="Edit"
                      *ngIf="canEdit">
                      <mat-icon>edit</mat-icon>
                    </button>
                    <button 
                      mat-icon-button 
                      color="warn"
                      (click)="deleteUser(user)"
                      matTooltip="Delete"
                      *ngIf="canDelete && user.userID !== currentUserId">
                      <mat-icon>delete</mat-icon>
                    </button>
                  </div>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

              <!-- No Data Row -->
              <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
                  <mat-icon>people_outline</mat-icon>
                  <p>No users found</p>
                </td>
              </tr>
            </table>
          </div>

          <mat-paginator 
            [pageSizeOptions]="[5, 10, 25, 50]"
            showFirstLastButtons
            aria-label="Select page of users">
          </mat-paginator>
        </mat-card-content>
      </mat-card>
    </div>
</template>
